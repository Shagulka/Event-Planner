{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Watson Forsberg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
      :root {
        --brand: #2c4391;
        --brand-light: #3d57b8;
        --brand-dark: #1f3070;
        --accent: #e8a020;
      }

      body {
        background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 60%, var(--brand-light) 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      .login-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
        padding: 2.5rem 2.2rem;
        width: 100%;
        max-width: 400px;
      }

      .login-logo { height: 48px; width: auto; }
      .login-title { font-size: 1.35rem; font-weight: 700; color: var(--brand-dark); }
      .login-subtitle { font-size: 0.85rem; color: #888; }

      .form-control:focus {
        border-color: var(--brand-light);
        box-shadow: 0 0 0 0.2rem rgba(61, 87, 184, 0.2);
      }

      .btn-login {
        background: var(--brand);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-weight: 600;
        padding: 0.65rem;
        font-size: 1rem;
        transition: background 0.15s;
      }
      .btn-login:hover { background: var(--brand-dark); color: #fff; }

      .divider { border-top: 1px solid #e9ecef; margin: 1.5rem 0 0.5rem; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <img src="{% static 'img/watson-forsberg-logo-2017.svg' %}" alt="Watson Forsberg" class="login-logo mb-3" />
        <p class="login-title mb-1">Sign in</p>
        <p class="login-subtitle">Watson Forsberg Events</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 mb-3" style="font-size: 0.88rem">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div class="mb-3">
          <label for="username" class="form-label small fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input id="username" name="username" type="text" class="form-control border-start-0"
                   placeholder="Enter your username" value="{{ username|default:'' }}"
                   autocomplete="username" autofocus />
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input id="password" name="password" type="password" class="form-control border-start-0"
                   placeholder="Enter your password" autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <div class="divider"></div>
      <div class="text-center mb-3">
        <a href="{% url 'django_microsoft_sso:oauth_start_login' %}{% if next %}?next={{ next }}{% endif %}"
           class="btn w-100 d-flex align-items-center justify-content-center gap-2"
           style="border: 1px solid #8c8c8c; border-radius: 8px; background: #fff; color: #5e5e5e; font-size: 0.95rem; padding: 0.6rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 21 21">
            <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
            <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
            <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
            <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
          </svg>
          Sign in with Microsoft
        </a>
      </div>

      <p class="text-center text-muted mb-0" style="font-size: 0.75rem">
        Watson Forsberg Events &copy; {% now "Y" %}
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
